<!DOCTYPE html>
<html>
<head>
    <title>T&C Analyzer</title>
</head>
<body>

    <h1>Terms & Conditions Analyzer</h1>

    <form action="/analyze" method="POST" enctype="multipart/form-data">

        <h3>Paste Terms & Conditions</h3>
        <textarea name="contract_text" rows="15" cols="100"></textarea>

        <br><br>

        <h3>OR Upload PDF/Image</h3>
        <input type="file" name="file">

        <br><br>

        <button type="submit">Analyze Contract</button>

    </form>

</body>
</html>
